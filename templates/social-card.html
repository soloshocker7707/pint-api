<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: {{background_color}};
      color: {{text_color}};
    }

    .card {
      width: 1000px;
      height: 450px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 4px solid {{text_color}};
      box-shadow: 20px 20px 0px 0px {{text_color}};
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .title {
      font-size: 80px;
      font-weight: 700;
      margin: 0;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 32px;
      margin-top: 20px;
      opacity: 0.8;
      font-weight: 400;
    }

    .brand {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 2px;
    }

    .dot {
      width: 100px;
      height: 100px;
      background: {{accent_color}};
      border-radius: 50%;
      position: absolute;
      top: -30px;
      right: -30px;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot"></div>
    <h1 class="title">{{title}}</h1>
    <div class="subtitle">{{subtitle}}</div>
    <div class="brand">PINT API</div>
  </div>
</body>
</html>
